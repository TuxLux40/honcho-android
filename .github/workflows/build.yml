name: Build APK

# Trigger: push any tag starting with "v" (e.g. v0.1.0, v0.2.0-beta)
# To release: git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - 'v*'

# Also allow manual trigger from the Actions tab (useful for testing the workflow itself)
  workflow_dispatch:

jobs:
  build:
    # Change to "self-hosted" if you set up a Proxmox LXC runner instead
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get version from tag
        id: version
        run: |
          # Works for both tag pushes and manual workflow_dispatch
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$TAG" = "$GITHUB_REF" ]; then
            TAG="manual-$(date +%Y%m%d-%H%M)"
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "APK_NAME=honcho-${TAG}.apk" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/${{ steps.version.outputs.APK_NAME }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Honcho ${{ steps.version.outputs.TAG }}
          body: |
            ## Install on your phone

            1. Download **${{ steps.version.outputs.APK_NAME }}** below
            2. Open it on your Android device (Settings → Install unknown apps → allow your browser/file manager)
            3. Tap Install

            > This is a debug build. It is **not** signed with a release key.
          files: app/build/outputs/apk/debug/${{ steps.version.outputs.APK_NAME }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.TAG, '-beta') || contains(steps.version.outputs.TAG, '-alpha') }}
